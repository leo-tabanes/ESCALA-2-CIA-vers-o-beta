// --- Mapeamento policial: banco (snake_case) <-> app (camelCase) ---
function policialDoBanco(row) {
  return {
    id: row.id, nomeGuerra: row.nome_guerra, re: row.re, posto: row.posto,
    equipeId: row.equipe_id, dataAncora: row.data_ancora, offsetCiclo: row.offset_ciclo,
    grupoRevezamento: row.grupo_revezamento, ativo: row.ativo,
  };
}
function policialParaBanco(p) {
  return {
    id: p.id, nome_guerra: p.nomeGuerra, re: p.re || null, posto: p.posto,
    equipe_id: p.equipeId, data_ancora: p.dataAncora || null, offset_ciclo: p.offsetCiclo || 0,
    grupo_revezamento: p.grupoRevezamento || null, ativo: p.ativo !== false,
  };
}

}
function afastamentoParaBanco(a) {

// --- API genérica de leitura/escrita por tabela ---
async function dbListar(tabela, mapeador) {
  const { data, error } = await db.from(tabela).select("*");
  if (error) { console.error(`Erro ao listar ${tabela}:`, error); return []; }
  return (data || []).map(mapeador);
}

async function dbSincronizar(tabela, registrosAtuais, mapeadorParaBanco, idField = "id") {
  // Estratégia simples: upsert de todos os registros atuais.
  // A exclusão é tratada separadamente via dbExcluir.
  if (registrosAtuais.length === 0) return true;
  const linhas = registrosAtuais.map(mapeadorParaBanco);
  const { error } = await db.from(tabela).upsert(linhas, { onConflict: idField });
  if (error) { console.error(`Erro ao salvar em ${tabela}:`, error); return false; }
  return true;
}

async function dbExcluir(tabela, idField, idValor) {
  const { error } = await db.from(tabela).delete().eq(idField, idValor);
  if (error) { console.error(`Erro ao excluir de ${tabela}:`, error); return false; }
  return true;
}

/* ============================================================
   LÓGICA DE CICLOS
   ============================================================ */

function diasEntre(isoA, isoB) {
  const a = new Date(isoA + "T00:00:00"), b = new Date(isoB + "T00:00:00");
  return Math.round((b - a) / 86400000);
}
function diaDaSemana(iso) { return new Date(iso + "T00:00:00").getDay(); }
function formatarDataBR(iso) { const [y,m,d] = iso.split("-"); return `${d}/${m}/${y}`; }
function diasDoMes(ano, mes) {
  const dias = []; const ultimo = new Date(ano, mes + 1, 0).getDate();
  for (let d = 1; d <= ultimo; d++) dias.push(`${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
  return dias;
}
function statusEquipe12x24(dataISO, ancoraISO, offsetEquipe = 0) {
  const dias = diasEntre(ancoraISO, dataISO) + offsetEquipe;
  const pos = ((dias % 4) + 4) % 4;
  if (pos === 0) return "DIA"; if (pos === 1) return "NOITE"; return "FOLGA";
}
function statusServico2x2(dataISO, ancoraISO, offset = 0) {
  const dias = diasEntre(ancoraISO, dataISO) + offset;
  const pos = ((dias % 4) + 4) % 4;
  return pos === 0 || pos === 1 ? "SERVICO" : "FOLGA";
}
function horarioCGP(dow) { return (dow === 5 || dow === 6) ? "14h30 – 03h00" : "12h30 – 01h00"; }
function horarioTurno12x24(turno) {
  if (turno === "DIA") return "07h00 – 19h00";
  if (turno === "NOITE") return "19h00 – 07h00";
  return "";
}

// Retorna o afastamento vigente (se houver) de um policial numa data específica.
function afastamentoNoDia(afastamentos, policialId, dataISO) {
  return afastamentos.find((a) => {
    if (a.policialId !== policialId) return false;
    if (a.dataFim) return dataISO >= a.dataInicio && dataISO <= a.dataFim;
    return dataISO === a.dataInicio;
  }) || null;
}

/* ============================================================
   GERAÇÃO AUTOMÁTICA DA ESCALA
   ============================================================ */

function gerarEscalaAutomatica(policiais, equipeId, ano, mes, configuracoesLotacao) {
  const equipe = EQUIPES.find((e) => e.id === equipeId);
  const dias = diasDoMes(ano, mes);
  const membros = policiais.filter((p) => p.equipeId === equipeId && p.ativo !== false);
  const resultado = {};
  dias.forEach((iso) => (resultado[iso] = []));

  if (equipe.tipo === "12x24-12x48") {
    const config = (configuracoesLotacao || []).find((c) => c.equipeId === equipeId);
    const ancoraLotacao = config?.dataAncora || "2026-01-01";
    membros.forEach((p) => {
      const grupo = GRUPOS_REVEZAMENTO.find((g) => g.id === p.grupoRevezamento) || GRUPOS_REVEZAMENTO[0];
      dias.forEach((iso) => {
        const status = statusEquipe12x24(iso, ancoraLotacao, grupo.offset);
        resultado[iso].push({ policialId: p.id, status, turnoLabel: status === "FOLGA" ? "Folga" : horarioTurno12x24(status) });
      });
    });
  } else if (equipe.tipo === "2x2") {
    membros.forEach((p) => {
      const ancora = p.dataAncora || "2026-01-01";
      const offset = p.offsetCiclo || 0;
      dias.forEach((iso) => {
        const status = statusServico2x2(iso, ancora, offset);
        resultado[iso].push({ policialId: p.id, status: status === "SERVICO" ? "SERVICO" : "FOLGA", turnoLabel: status === "SERVICO" ? "Serviço" : "Folga" });
      });
    });
  } else if (equipe.tipo === "2x2-cgp") {
    const sargenteados = membros.filter((p) => GRADUACOES_SARGENTEADAS.includes(p.posto));
    const pracas = membros.filter((p) => !GRADUACOES_SARGENTEADAS.includes(p.posto));
    dias.forEach((iso) => {
      const dow = diaDaSemana(iso);
      const turnoServico = horarioCGP(dow);
      [...sargenteados.map((p) => ({ p, funcao: "Comandante de Equipe" })), ...pracas.map((p) => ({ p, funcao: "Patrulheiro" }))].forEach(({ p, funcao }) => {
        const ancora = p.dataAncora || "2026-01-01";
        const offset = p.offsetCiclo || 0;
        const status = statusServico2x2(iso, ancora, offset);
        resultado[iso].push({ policialId: p.id, status: status === "SERVICO" ? "SERVICO" : "FOLGA", turnoLabel: status === "SERVICO" ? turnoServico : "Folga", funcao: status === "SERVICO" ? funcao : undefined });
      });
    });
  }
  return resultado;
}

/* ============================================================
   CONSULTA POR RE
   ============================================================ */

function TelaConsultaRE({ policiais, afastamentos, reforcos, configuracoesLotacao, substituicoes, onVoltar }) {
  const [re, setRe] = useState("");
  const [resultado, setResultado] = useState(null);
  const [erro, setErro] = useState("");
  const [dataRef, setDataRef] = useState(() => { const h = new Date(); return { ano: h.getFullYear(), mes: h.getMonth() }; });

  const buscar = (e) => {
    e.preventDefault();
    const pol = policiais.find((p) => p.re === re.trim());
    if (!pol) { setErro("RE não encontrado. Verifique os 6 dígitos."); setResultado(null); return; }
    setErro(""); setResultado(pol);
  };

  const mudarMes = (delta) => {
    let nm = dataRef.mes + delta, na = dataRef.ano;
    if (nm < 0) { nm = 11; na -= 1; } if (nm > 11) { nm = 0; na += 1; }
    setDataRef({ ano: na, mes: nm });
  };

  const equipe = resultado ? EQUIPES.find((e) => e.id === resultado.equipeId) : null;
  const dias = diasDoMes(dataRef.ano, dataRef.mes);
  const escalaBase = useMemo(() => resultado ? gerarEscalaAutomatica(policiais, resultado.equipeId, dataRef.ano, dataRef.mes, configuracoesLotacao) : {}, [policiais, resultado, dataRef, configuracoesLotacao]);

  const statusDoDia = useCallback((iso) => {
    if (!resultado) return null;
    // Este policial está cobrindo outra pessoa neste dia?
    const comoSubstituto = substituicoes.find((s) => s.substitutoId === resultado.id && s.dataISO === iso);
    if (comoSubstituto) {
      const titular = policiais.find((p) => p.id === comoSubstituto.titularId);
      const equipeTitular = EQUIPES.find((e) => e.id === comoSubstituto.equipeId);
      return { status: "SERVICO", turnoLabel: `Substituindo ${titular?.nomeGuerra || "—"} (${equipeTitular?.nome || ""})` };
    }
    // Este policial foi substituído neste dia (na escala dele)?
    const comoTitular = substituicoes.find((s) => s.titularId === resultado.id && s.dataISO === iso);
    if (comoTitular) {
      const substituto = policiais.find((p) => p.id === comoTitular.substitutoId);
      return { status: "FOLGA", turnoLabel: `Substituído por ${substituto?.nomeGuerra || "—"}` };
    }
    const afastamento = afastamentoNoDia(afastamentos, resultado.id, iso);
    if (afastamento) {
      const tipo = TIPOS_AFASTAMENTO.find((t) => t.id === afastamento.tipo);
      return { status: "AFASTADO", turnoLabel: tipo?.label };
    }
    const reforco = reforcos.find((r) => r.policialId === resultado.id && r.dataISO === iso);
    if (reforco) return { status: "SERVICO", turnoLabel: "Reforço manual" };
    return (escalaBase[iso] || []).find((b) => b.policialId === resultado.id) || null;
  }, [escalaBase, afastamentos, reforcos, substituicoes, resultado, policiais]);

  return (
    <div style={styles.loginWrap}>
      <div style={{ ...styles.loginCard, maxWidth: 480 }}>
        <div style={styles.loginHeader}>
          <IconSearch size={28} color="#1a3a5c" />
          <div>
            <div style={styles.loginTitle}>Consultar minha escala</div>
            <div style={styles.loginSubtitle}>Informe seu RE (6 dígitos)</div>
          </div>
        </div>
        <form onSubmit={buscar} style={{ marginTop: 20, display: "flex", gap: 8 }}>
          <input style={{ ...styles.input, flex: 1, marginTop: 0 }} value={re} onChange={(e) => setRe(e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="000000" inputMode="numeric" maxLength={6} />
          <button type="submit" style={{ ...styles.btnPrimary, width: "auto", marginTop: 0, padding: "11px 16px" }}>Buscar</button>
        </form>
        {erro && <div style={styles.erroMsg}>{erro}</div>}
        {resultado && (
          <div style={{ marginTop: 20 }}>
            <div style={styles.consultaResultadoHeader}>
              <IconUser size={18} color="#1a3a5c" />
              <div>
                <div style={{ fontWeight: 700, color: "#1e293b" }}>{resultado.nomeGuerra}</div>
                <div style={{ fontSize: 12.5, color: "#64748b" }}>{resultado.posto} · {equipe?.nome}</div>
              </div>
            </div>
            <div style={styles.mesNav}>
              <button onClick={() => mudarMes(-1)} style={styles.mesNavBtn}><IconChevronLeft size={18} /></button>
              <div style={{ ...styles.mesNavLabel, fontSize: 14 }}>{MESES[dataRef.mes]} {dataRef.ano}</div>
              <button onClick={() => mudarMes(1)} style={styles.mesNavBtn}><IconChevronRight size={18} /></button>
            </div>
            <div style={styles.consultaLista}>
              {dias.map((iso) => {
                const item = statusDoDia(iso); const dow = diaDaSemana(iso); const emServico = item && item.status !== "FOLGA";
                return (
                  <div key={iso} style={{ ...styles.consultaLinha, ...(emServico ? styles.consultaLinhaServico : {}) }}>
                    <span style={styles.consultaData}>{formatarDataBR(iso)} · {["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][dow]}</span>
                    <span style={{ ...styles.consultaStatus, color: emServico ? "#15803d" : "#94a3b8" }}>{item ? item.turnoLabel : "—"}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <button onClick={onVoltar} style={{ ...styles.btnTextoCancelar, width: "100%", marginTop: 16, textAlign: "center" }}>← Voltar</button>
      </div>
    </div>
  );
}

/* ============================================================
   APP PRINCIPAL
   ============================================================ */

function App() {
  const [carregando, setCarregando] = useState(true);
  const [erroCarregar, setErroCarregar] = useState("");
  const [modoTela, setModoTela] = useState("login");
  const [usuarioLogado, setUsuarioLogado] = useState(null);
  const [policiais, setPoliciais] = useState([]);
  const [escalantes, setEscalantes] = useState([]);
  const [afastamentos, setAfastamentos] = useState([]);
  const [reforcos, setReforcos] = useState([]); // { id, policialId, dataISO, equipeId }
  const [configuracoesLotacao, setConfiguracoesLotacao] = useState([]); // { equipeId, dataAncora }
  const [substituicoes, setSubstituicoes] = useState([]); // { id, titularId, substitutoId, equipeId, dataISO }
  const [equipeAtiva, setEquipeAtiva] = useState(EQUIPES[0].id);
  const [dataRef, setDataRef] = useState(() => { const h = new Date(); return { ano: h.getFullYear(), mes: h.getMonth() }; });
  const [abaPrincipal, setAbaPrincipal] = useState("escala");
  const [erroSalvar, setErroSalvar] = useState("");
  const [modalConfigAberto, setModalConfigAberto] = useState(false);
  const [modalConsolidadaAberto, setModalConsolidadaAberto] = useState(false);

  const podeEditar = usuarioLogado && usuarioLogado !== "visitante";

  useEffect(() => {
    (async () => {
      try {
        const [pol, esc, afa, ref, cfg, sub] = await Promise.all([
          dbListar("policiais", policialDoBanco),
          dbListar("escalantes", (row) => ({ usuario: row.usuario, senha: row.senha, nome: row.nome })),
          dbListar("afastamentos", afastamentoDoBanco),
          dbListar("reforcos", reforcoDoBanco),
          dbListar("configuracoes_lotacao", configLotacaoDoBanco),
          dbListar("substituicoes", substituicaoDoBanco),
        ]);
        setPoliciais(pol);
        setEscalantes(esc.length > 0 ? esc : [{ usuario: "admin", senha: "admin123", nome: "Administrador" }]);
        setAfastamentos(afa);
        setReforcos(ref);
        setConfiguracoesLotacao(cfg);
        setSubstituicoes(sub);
      } catch (e) {
        setErroCarregar("Não foi possível conectar ao banco de dados. Verifique sua internet e tente novamente.");
      }
      setCarregando(false);
    })();
  }, []);

  const salvarPoliciais = useCallback(async (novos, removidoId) => {
    setPoliciais(novos);
    if (removidoId) await dbExcluir("policiais", "id", removidoId);
    const ok = await dbSincronizar("policiais", novos, policialParaBanco);
    if (!ok) setErroSalvar("Não foi possível salvar no banco de dados. Verifique sua internet.");
  }, []);
  const salvarEscalantes = useCallback(async (novos, removidoUsuario) => {
    setEscalantes(novos);
    if (removidoUsuario) await dbExcluir("escalantes", "usuario", removidoUsuario);
    const ok = await dbSincronizar("escalantes", novos, (e) => ({ usuario: e.usuario, senha: e.senha, nome: e.nome }), "usuario");
    if (!ok) setErroSalvar("Não foi possível salvar no banco de dados. Verifique sua internet.");
  }, []);
  const salvarAfastamentos = useCallback(async (novos, removidoId) => {
    setAfastamentos(novos);
    if (removidoId) await dbExcluir("afastamentos", "id", removidoId);
    const ok = await dbSincronizar("afastamentos", novos, afastamentoParaBanco);
    if (!ok) setErroSalvar("Não foi possível salvar no banco de dados. Verifique sua internet.");
  }, []);
  const salvarReforcos = useCallback(async (novos, removidoId) => {
    setReforcos(novos);
    if (removidoId) await dbExcluir("reforcos", "id", removidoId);
    const ok = await dbSincronizar("reforcos", novos, reforcoParaBanco);
    if (!ok) setErroSalvar("Não foi possível salvar no banco de dados. Verifique sua internet.");
  }, []);
  const salvarConfiguracaoLotacao = useCallback(async (equipeId, dataAncora) => {
    const novas = [...configuracoesLotacao.filter((c) => c.equipeId !== equipeId), { equipeId, dataAncora }];
    setConfiguracoesLotacao(novas);
    const ok = await dbSincronizar("configuracoes_lotacao", novas, configLotacaoParaBanco, "equipe_id");
    if (!ok) setErroSalvar("Não foi possível salvar a configuração. Verifique sua internet.");
  }, [configuracoesLotacao]);
  const salvarSubstituicoes = useCallback(async (novas, removidoId) => {
    setSubstituicoes(novas);
    if (removidoId) await dbExcluir("substituicoes", "id", removidoId);
    const ok = await dbSincronizar("substituicoes", novas, substituicaoParaBanco);
    if (!ok) setErroSalvar("Não foi possível salvar no banco de dados. Verifique sua internet.");
  }, []);

  if (carregando) {
    return (
      <div style={styles.loadingWrap}>
        <div style={styles.spinner} />
        <div style={{ marginTop: 16, color: "#64748b", fontSize: 14 }}>Conectando ao banco de dados…</div>
      </div>
    );
  }

  if (erroCarregar) {
    return (
      <div style={styles.loadingWrap}>
        <IconAlertTriangle size={32} color="#dc2626" />
        <div style={{ marginTop: 16, color: "#dc2626", fontSize: 14, textAlign: "center", padding: "0 24px" }}>{erroCarregar}</div>
        <button onClick={() => window.location.reload()} style={{ ...styles.btnPrimary, width: "auto", marginTop: 16 }}>Tentar novamente</button>
      </div>
    );
  }

  if (modoTela === "consultaRE") {
    return <TelaConsultaRE policiais={policiais} afastamentos={afastamentos} reforcos={reforcos} configuracoesLotacao={configuracoesLotacao} substituicoes={substituicoes} onVoltar={() => setModoTela("login")} />;
  }

  if (!usuarioLogado) {
    return (
      <TelaLogin
        escalantes={escalantes}
        onLogin={(u) => { setUsuarioLogado(u); setModoTela("app"); }}
        onVisitante={() => { setUsuarioLogado("visitante"); setModoTela("app"); }}
        onConsultaRE={() => setModoTela("consultaRE")}
      />
    );
  }

  return (
    <div style={styles.appWrap}>
      <TopBar usuarioLogado={usuarioLogado} onLogout={() => { setUsuarioLogado(null); setModoTela("login"); }} podeEditar={podeEditar} />
      {podeEditar && (
        <div style={styles.tabBar}>
          <TabButton ativo={abaPrincipal === "escala"} onClick={() => setAbaPrincipal("escala")} Icon={IconCalendar} label="Escala" />
          <TabButton ativo={abaPrincipal === "policiais"} onClick={() => setAbaPrincipal("policiais")} Icon={IconUsers} label="Policiais" />
          <TabButton ativo={abaPrincipal === "afastamentos"} onClick={() => setAbaPrincipal("afastamentos")} Icon={IconAlertTriangle} label="Afastamentos e outros" />
          <TabButton ativo={abaPrincipal === "substituicoes"} onClick={() => setAbaPrincipal("substituicoes")} Icon={IconUser} label="Substituições" />
          <TabButton ativo={abaPrincipal === "escalantes"} onClick={() => setAbaPrincipal("escalantes")} Icon={IconShield} label="Escalantes" />
        </div>
      )}
      <div style={styles.content}>
        {(!podeEditar || abaPrincipal === "escala") && (
          <TelaEscala
            policiais={policiais} equipeAtiva={equipeAtiva} setEquipeAtiva={setEquipeAtiva}
            dataRef={dataRef} setDataRef={setDataRef}
            afastamentos={afastamentos} reforcos={reforcos} salvarReforcos={salvarReforcos}
            configuracoesLotacao={configuracoesLotacao}
            substituicoes={substituicoes}
            podeEditar={podeEditar}
            onAbrirConfig={() => setModalConfigAberto(true)}
            onAbrirConsolidada={() => setModalConsolidadaAberto(true)}
          />
        )}
        {podeEditar && abaPrincipal === "policiais" && <TelaPoliciais policiais={policiais} salvarPoliciais={salvarPoliciais} />}
        {podeEditar && abaPrincipal === "afastamentos" && <TelaAfastamentos policiais={policiais} afastamentos={afastamentos} salvarAfastamentos={salvarAfastamentos} />}
        {podeEditar && abaPrincipal === "substituicoes" && <TelaSubstituicoes policiais={policiais} substituicoes={substituicoes} salvarSubstituicoes={salvarSubstituicoes} />}
        {podeEditar && abaPrincipal === "escalantes" && <TelaEscalantes escalantes={escalantes} salvarEscalantes={salvarEscalantes} />}
      </div>
      {modalConfigAberto && (
        <ModalConfiguracaoLotacao
          configuracoesLotacao={configuracoesLotacao}
          salvarConfiguracaoLotacao={salvarConfiguracaoLotacao}
          onClose={() => setModalConfigAberto(false)}
        />
      )}
      {modalConsolidadaAberto && (
        <ModalVisaoConsolidada
          policiais={policiais} afastamentos={afastamentos} reforcos={reforcos} substituicoes={substituicoes}
          configuracoesLotacao={configuracoesLotacao} dataRef={dataRef}
          onClose={() => setModalConsolidadaAberto(false)}
        />
      )}
      {erroSalvar && (
        <div style={styles.toastErro}>
          <IconAlertTriangle size={16} /> {erroSalvar}
          <button onClick={() => setErroSalvar("")} style={styles.toastClose}><IconX size={14} /></button>
        </div>
      )}
    </div>
  );
}

  return (
    <div style={styles.topBar}>
      <div style={styles.topBarLeft}>
        <IconShield size={22} color="#fff" />
        <div>
          <div style={styles.topBarTitle}>2ª Companhia PM</div>
          <div style={styles.topBarSubtitle}>Escala Mensal</div>
        </div>
      </div>
      <div style={styles.topBarRight}>

function TabButton({ ativo, onClick, Icon, label }) {

}

/* ============================================================
   TELA: ESCALA — GRADE
   ============================================================ */

function TelaEscala({ policiais, equipeAtiva, setEquipeAtiva, dataRef, setDataRef, afastamentos, reforcos, salvarReforcos, configuracoesLotacao, substituicoes, podeEditar, onAbrirConfig, onAbrirConsolidada }) {
  const [modalCelula, setModalCelula] = useState(null);
  const equipe = EQUIPES.find((e) => e.id === equipeAtiva);
  const membrosEquipe = useMemo(() => policiais.filter((p) => p.equipeId === equipeAtiva && p.ativo !== false).sort((a,b) => a.nomeGuerra.localeCompare(b.nomeGuerra)), [policiais, equipeAtiva]);
  const semCadastroDeCiclo = equipe.tipo === "12x24-12x48" && membrosEquipe.some((p) => !p.grupoRevezamento);
  const semConfiguracaoLotacao = equipe.tipo === "12x24-12x48" && !configuracoesLotacao.some((c) => c.equipeId === equipeAtiva);

  const mudarMes = (delta) => {
    let nm = dataRef.mes + delta, na = dataRef.ano;
    if (nm < 0) { nm = 11; na -= 1; } if (nm > 11) { nm = 0; na += 1; }
    setDataRef({ ano: na, mes: nm });
  };

  // Gera a escala automática deste mês/equipe em tempo real (sem precisar salvar nada).
  const escalaBase = useMemo(() => gerarEscalaAutomatica(policiais, equipeAtiva, dataRef.ano, dataRef.mes, configuracoesLotacao), [policiais, equipeAtiva, dataRef, configuracoesLotacao]);

  const dias = diasDoMes(dataRef.ano, dataRef.mes);

  // Combina: substituição pontual > afastamento vigente > reforço manual > ciclo automático.
  const statusFinal = useCallback((iso, policialId) => {
    const substituicao = substituicoes.find((s) => s.titularId === policialId && s.dataISO === iso);
    if (substituicao) {
      const substituto = policiais.find((p) => p.id === substituicao.substitutoId);
      return {
        status: "SUBSTITUIDO",
        turnoLabel: substituto ? `Substituído por ${substituto.nomeGuerra}` : "Substituído",
        marcacaoSigla: substituto ? substituto.nomeGuerra.slice(0, 3).toUpperCase() : "SUB",
        marcacaoCor: "#0d9488",
        substituto: true,
      };
    }
    const afastamento = afastamentoNoDia(afastamentos, policialId, iso);
    if (afastamento) {
      const tipo = TIPOS_AFASTAMENTO.find((t) => t.id === afastamento.tipo);
      const baseCiclo = (escalaBase[iso] || []).find((b) => b.policialId === policialId);
      const conflito = baseCiclo && (baseCiclo.status === "DIA" || baseCiclo.status === "NOITE" || baseCiclo.status === "SERVICO");
      return {
        status: "AFASTADO",
        turnoLabel: conflito ? `${tipo?.label} (conflito: ciclo previa ${baseCiclo.turnoLabel || baseCiclo.status})` : tipo?.label,
        marcacaoSigla: tipo?.sigla,
        marcacaoCor: conflito ? "#dc2626" : tipo?.cor,
        conflito,
      };
    }
    const reforco = reforcos.find((r) => r.policialId === policialId && r.dataISO === iso);
    if (reforco) return { status: "SERVICO", turnoLabel: "Reforço manual" };
    const base = (escalaBase[iso] || []).find((b) => b.policialId === policialId);
    return base || null;
  }, [escalaBase, afastamentos, reforcos]);

  const removerReforco = (policialId, iso) => {
    const reforco = reforcos.find((r) => r.policialId === policialId && r.dataISO === iso);
    salvarReforcos(reforcos.filter((r) => !(r.policialId === policialId && r.dataISO === iso)), reforco?.id);
  };
  const adicionarReforco = (policialId, iso) => {
    if (afastamentoNoDia(afastamentos, policialId, iso)) {
      alert("Este policial tem um afastamento lançado neste dia. Não é possível colocá-lo de serviço enquanto o afastamento estiver vigente.");
      return;
    }
    salvarReforcos([...reforcos, { id: `rf-${Date.now()}`, policialId, dataISO: iso, equipeId: equipeAtiva }]);
  };

  return (
    <div>
      <div style={styles.equipeSelector}>
        {EQUIPES.map((eq) => <button key={eq.id} onClick={() => setEquipeAtiva(eq.id)} style={{ ...styles.equipeChip, ...(equipeAtiva === eq.id ? styles.equipeChipAtivo : {}) }}>{eq.nome}</button>)}
      </div>
      <div style={styles.mesNav}>
        <button onClick={() => mudarMes(-1)} style={styles.mesNavBtn}><IconChevronLeft size={20} /></button>
        <div style={styles.mesNavLabel}>{MESES[dataRef.mes]} {dataRef.ano}</div>
        <button onClick={() => mudarMes(1)} style={styles.mesNavBtn}><IconChevronRight size={20} /></button>
      </div>
      <div style={styles.acoesEscala}>
        <button onClick={() => exportarPDF(equipe, dias, membrosEquipe, statusFinal, dataRef)} style={{ ...styles.btnSecondary, width: "auto" }}><IconDownload size={16} /> Exportar PDF</button>
        {podeEditar && <button onClick={onAbrirConfig} style={{ ...styles.btnSecondary, width: "auto" }}><IconCalendar size={16} /> Configuração da escala</button>}
        <button onClick={onAbrirConsolidada} style={{ ...styles.btnSecondary, width: "auto" }}><IconUsers size={16} /> Ver todas as lotações</button>
      </div>
      {equipe.tipo === "12x24-12x48" && (
        <div style={styles.legenda}>
          <span style={{ ...styles.legendaItem, background: "#fef3c7", color: "#92400e" }}>● Turno DIA</span>
          <span style={{ ...styles.legendaItem, background: "#dbeafe", color: "#1e40af" }}>● Turno NOITE</span>
          <span style={{ ...styles.legendaItem, background: "#f1f5f9", color: "#64748b" }}>● Folga</span>
        </div>
      )}
      {semConfiguracaoLotacao && (
        <div style={styles.avisoAtencao}><IconAlertTriangle size={15} /> Esta lotação ainda não tem data-âncora configurada. {podeEditar ? 'Defina em "Configuração da escala" antes de usar a grade.' : 'Peça a um escalante para configurá-la.'}</div>
      )}
      {semCadastroDeCiclo && (
        <div style={styles.avisoAtencao}><IconAlertTriangle size={15} /> Há policiais sem "Equipe de revezamento (A/B/C/D)" definida — a escala deles não aparecerá corretamente. Edite o cadastro na aba Policiais.</div>
      )}
      {membrosEquipe.length === 0 && <div style={styles.semEscala}><IconCalendar size={36} color="#cbd5e1" /><div style={{ marginTop: 8, color: "#64748b" }}>Nenhum policial cadastrado em {equipe.nome} ainda.</div></div>}
      {membrosEquipe.length > 0 && (
        <div style={styles.gradeWrap}>
          <table style={styles.gradeTable}>
            <thead>
              <tr>
                <th style={styles.gradeTh}>Policial</th>
                {dias.map((iso) => { const dow = diaDaSemana(iso); return (
                  <th key={iso} style={{ ...styles.gradeThDia, ...(dow === 0 || dow === 6 ? styles.gradeThFimSemana : {}) }}>
                    <div>{iso.split("-")[2]}</div><div style={styles.gradeThDow}>{["D","S","T","Q","Q","S","S"][dow]}</div>
                  </th>
                ); })}
              </tr>
            </thead>
            <tbody>
              {membrosEquipe.map((p) => (
                <tr key={p.id}>
                  <td style={styles.gradeTdNome}><div style={{ fontWeight: 700 }}>{p.nomeGuerra}</div><div style={styles.gradeTdPosto}>{p.posto}</div></td>
                  {dias.map((iso) => { const item = statusFinal(iso, p.id); return (
                    <td key={iso} onClick={() => podeEditar && setModalCelula({ dataISO: iso, policialId: p.id })} style={{ ...styles.gradeTd, ...celulaEstilo(item), cursor: podeEditar ? "pointer" : "default" }} title={item?.turnoLabel || ""}>{celulaTexto(item)}</td>
                  ); })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {modalCelula && (
        <ModalEdicaoCelula
          dataISO={modalCelula.dataISO}
          policial={policiais.find((p) => p.id === modalCelula.policialId)}
          equipe={equipe}
          item={statusFinal(modalCelula.dataISO, modalCelula.policialId)}
          temReforco={reforcos.some((r) => r.policialId === modalCelula.policialId && r.dataISO === modalCelula.dataISO)}
          temAfastamento={!!afastamentoNoDia(afastamentos, modalCelula.policialId, modalCelula.dataISO)}
          onClose={() => setModalCelula(null)}
          onAdicionarReforco={() => { adicionarReforco(modalCelula.policialId, modalCelula.dataISO); setModalCelula(null); }}
          onRemoverReforco={() => { removerReforco(modalCelula.policialId, modalCelula.dataISO); setModalCelula(null); }}
        />
      )}
    </div>
  );
}

function celulaEstilo(item) {
  if (!item) return { background: "#fafafa", color: "#d4d4d4" };
  if (item.substituto) return { background: "#0d948822", color: "#0d9488", fontWeight: 700, border: "2px dashed #0d9488" };
  if (item.conflito) return { background: "#fee2e2", color: "#dc2626", fontWeight: 700, border: "2px solid #dc2626" };
  if (item.marcacaoCor) return { background: item.marcacaoCor + "22", color: item.marcacaoCor, fontWeight: 700, borderLeft: `2px solid ${item.marcacaoCor}` };
  if (item.status === "DIA") return { background: "#fef3c7", color: "#92400e", fontWeight: 700 };
  if (item.status === "NOITE") return { background: "#dbeafe", color: "#1e40af", fontWeight: 700 };
  if (item.status === "SERVICO") return { background: "#dcfce7", color: "#15803d", fontWeight: 700 };
  return { background: "#f8fafc", color: "#cbd5e1" };
}
function celulaTexto(item) {
  if (!item) return "—";
  if (item.marcacaoSigla) return item.marcacaoSigla;
  if (item.status === "DIA") return "DIA"; if (item.status === "NOITE") return "NOI"; if (item.status === "SERVICO") return "SRV";
  return "—";
}

// Modal simplificado: a célula agora só permite reforço manual (colocar/retirar serviço extra).
// Afastamentos (férias, atestado, etc.) são geridos centralmente na aba "Afastamentos e outros".
function ModalEdicaoCelula({ dataISO, policial, equipe, item, temReforco, temAfastamento, onClose, onAdicionarReforco, onRemoverReforco }) {
  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={{ ...styles.modalCard, maxWidth: 380 }} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <div><div style={styles.modalTitle}>{policial.nomeGuerra}</div><div style={styles.modalSubtitle}>{formatarDataBR(dataISO)} · {equipe.nome}</div></div>
          <button onClick={onClose} style={styles.modalClose}><IconX size={20} /></button>
        </div>
        <div style={styles.modalBody}>
          <div style={styles.hint}>Situação neste dia: <strong>{item ? (item.turnoLabel || item.status) : "não escalado"}</strong></div>
          {temAfastamento && (
            <div style={styles.avisoAtencao}><IconAlertTriangle size={15} /> Este dia tem um afastamento lançado na aba "Afastamentos e outros". Para alterá-lo, edite ou remova o lançamento lá.</div>
          )}
          {!temAfastamento && (
            <>
              <label style={styles.label}>Reforço manual (fora do ciclo automático)</label>
              <div style={styles.hint}>Use para colocar o policial de serviço neste dia mesmo estando de folga pelo ciclo automático.</div>
              {!temReforco && <button onClick={onAdicionarReforco} style={{ ...styles.btnPrimary, marginTop: 12 }}><IconPlus size={16} /> Colocar de serviço (reforço)</button>}
              {temReforco && <button onClick={onRemoverReforco} style={{ ...styles.btnSecondary, marginTop: 12 }}><IconTrash size={16} /> Remover este reforço</button>}
            </>
          )}
        </div>
        <div style={styles.modalFooter}><button onClick={onClose} style={styles.btnTextoCancelar}>Fechar</button></div>
      </div>
    </div>
  );
}

/* ============================================================
   MODAL: CONFIGURAÇÃO DA ESCALA (data-âncora por lotação)
   ============================================================ */

function ModalConfiguracaoLotacao({ configuracoesLotacao, salvarConfiguracaoLotacao, onClose }) {
  const lotacoes12x24 = EQUIPES.filter((e) => e.tipo === "12x24-12x48");
  const [valores, setValores] = useState(() => {
    const inicial = {};
    lotacoes12x24.forEach((eq) => {
      const config = configuracoesLotacao.find((c) => c.equipeId === eq.id);
      inicial[eq.id] = config?.dataAncora || "";
    });
    return inicial;
  });

  const salvarUma = (equipeId) => {
    const dataAncora = valores[equipeId];
    if (!dataAncora) { alert("Informe uma data-âncora válida."); return; }
    salvarConfiguracaoLotacao(equipeId, dataAncora);
  };

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalCard} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <div>
            <div style={styles.modalTitle}>Configuração da escala</div>
            <div style={styles.modalSubtitle}>Data-âncora por lotação (regime 12x24/12x48)</div>
          </div>
          <button onClick={onClose} style={styles.modalClose}><IconX size={20} /></button>
        </div>
        <div style={styles.modalBody}>
          <div style={styles.hint}>
            A data-âncora define em qual dia a <strong>Equipe A</strong> está de turno <strong>DIA</strong> e a <strong>Equipe B</strong> de turno <strong>NOITE</strong> (as equipes C e D seguem automaticamente o rodízio de 4 dias).
            Cada lotação tem sua própria data, de forma independente.
          </div>
          {lotacoes12x24.map((eq) => {
            const configAtual = configuracoesLotacao.find((c) => c.equipeId === eq.id);
            return (
              <div key={eq.id} style={styles.configLotacaoBloco}>
                <div style={styles.configLotacaoNome}>{eq.nome}</div>
                <div style={styles.addExtraRowConfig}>
                  <input
                    type="date"
                    style={{ ...styles.input, marginTop: 0, flex: 1 }}
                    value={valores[eq.id]}
                    onChange={(e) => setValores({ ...valores, [eq.id]: e.target.value })}
                  />
                  <button onClick={() => salvarUma(eq.id)} style={styles.btnSecondarySmall}><IconCheck size={14} /> Salvar</button>
                </div>
                {configAtual && <div style={styles.hint}>Configurado: A=DIA, B=NOITE em {formatarDataBR(configAtual.dataAncora)}.</div>}
                {!configAtual && <div style={{ ...styles.hint, color: "#92400e" }}>Ainda não configurado.</div>}
              </div>
            );
          })}
        </div>
        <div style={styles.modalFooter}><button onClick={onClose} style={styles.btnTextoCancelar}>Fechar</button></div>
      </div>
    </div>
  );
}

/* ============================================================
   MODAL: VISÃO CONSOLIDADA (todas as lotações juntas)
   ============================================================ */

function ModalVisaoConsolidada({ policiais, afastamentos, reforcos, substituicoes, configuracoesLotacao, dataRef, onClose }) {
  const dias = diasDoMes(dataRef.ano, dataRef.mes);

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={{ ...styles.modalCard, maxWidth: 1100, width: "96vw" }} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <div>
            <div style={styles.modalTitle}>Todas as lotações</div>
            <div style={styles.modalSubtitle}>{MESES[dataRef.mes]} de {dataRef.ano}</div>
          </div>
          <button onClick={onClose} style={styles.modalClose}><IconX size={20} /></button>
        </div>
        <div style={{ ...styles.modalBody, maxHeight: "75vh", overflowY: "auto" }}>
          {EQUIPES.map((equipe) => {
            const membros = policiais.filter((p) => p.equipeId === equipe.id && p.ativo !== false).sort((a,b) => a.nomeGuerra.localeCompare(b.nomeGuerra));
            if (membros.length === 0) return null;
            const escalaBase = gerarEscalaAutomatica(policiais, equipe.id, dataRef.ano, dataRef.mes, configuracoesLotacao);
            const statusFinal = (iso, policialId) => {
              const substituicao = substituicoes.find((s) => s.titularId === policialId && s.dataISO === iso);
              if (substituicao) {
                const substituto = policiais.find((p) => p.id === substituicao.substitutoId);
                return { status: "SUBSTITUIDO", marcacaoSigla: substituto ? substituto.nomeGuerra.slice(0,3).toUpperCase() : "SUB", marcacaoCor: "#0d9488", substituto: true };
              }
              const afastamento = afastamentoNoDia(afastamentos, policialId, iso);
              if (afastamento) {
                const tipo = TIPOS_AFASTAMENTO.find((t) => t.id === afastamento.tipo);
                const baseCiclo = (escalaBase[iso] || []).find((b) => b.policialId === policialId);
                const conflito = baseCiclo && (baseCiclo.status === "DIA" || baseCiclo.status === "NOITE" || baseCiclo.status === "SERVICO");
                return { status: "AFASTADO", marcacaoSigla: tipo?.sigla, marcacaoCor: conflito ? "#dc2626" : tipo?.cor, conflito };
              }
              const reforco = reforcos.find((r) => r.policialId === policialId && r.dataISO === iso);
              if (reforco) return { status: "SERVICO", turnoLabel: "Reforço manual" };
              return (escalaBase[iso] || []).find((b) => b.policialId === policialId) || null;
            };
            return (
              <div key={equipe.id} style={{ marginBottom: 24 }}>
                <div style={styles.configLotacaoNome}>{equipe.nome}</div>
                <div style={styles.gradeWrap}>
                  <table style={styles.gradeTable}>
                    <thead>
                      <tr>
                        <th style={styles.gradeTh}>Policial</th>
                        {dias.map((iso) => { const dow = diaDaSemana(iso); return (
                          <th key={iso} style={{ ...styles.gradeThDia, ...(dow === 0 || dow === 6 ? styles.gradeThFimSemana : {}) }}>
                            <div>{iso.split("-")[2]}</div><div style={styles.gradeThDow}>{["D","S","T","Q","Q","S","S"][dow]}</div>
                          </th>
                        ); })}
                      </tr>
                    </thead>
                    <tbody>
                      {membros.map((p) => (
                        <tr key={p.id}>
                          <td style={styles.gradeTdNome}><div style={{ fontWeight: 700 }}>{p.nomeGuerra}</div><div style={styles.gradeTdPosto}>{p.posto}</div></td>
                          {dias.map((iso) => { const item = statusFinal(iso, p.id); return (
                            <td key={iso} style={{ ...styles.gradeTd, ...celulaEstilo(item) }}>{celulaTexto(item)}</td>
                          ); })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}
        </div>
        <div style={styles.modalFooter}><button onClick={onClose} style={styles.btnTextoCancelar}>Fechar</button></div>
      </div>
    </div>
  );
}

function TelaAfastamentos({ policiais, afastamentos, salvarAfastamentos }) {
  const [modalAberto, setModalAberto] = useState(false);
  const [filtroTipo, setFiltroTipo] = useState("todos");

  const listaOrdenada = useMemo(() => {
    const lista = filtroTipo === "todos" ? afastamentos : afastamentos.filter((a) => a.tipo === filtroTipo);
    return [...lista].sort((a, b) => b.dataInicio.localeCompare(a.dataInicio));
  }, [afastamentos, filtroTipo]);

  const adicionar = (dados) => { salvarAfastamentos([...afastamentos, { ...dados, id: `af-${Date.now()}` }]); setModalAberto(false); };
  const remover = (id) => { if (confirm("Remover este lançamento?")) salvarAfastamentos(afastamentos.filter((a) => a.id !== id), id); };

  return (
    <div>
      <div style={styles.filtroRow}>
        <select value={filtroTipo} onChange={(e) => setFiltroTipo(e.target.value)} style={styles.selectFull}>
          <option value="todos">Todos os tipos ({afastamentos.length})</option>
          {TIPOS_AFASTAMENTO.map((t) => <option key={t.id} value={t.id}>{t.label} ({afastamentos.filter((a) => a.tipo === t.id).length})</option>)}
        </select>
        <button onClick={() => setModalAberto(true)} style={styles.btnPrimary}><IconPlus size={16} /> Novo lançamento</button>
      </div>
      <div style={styles.listaPoliciais}>
        {listaOrdenada.length === 0 && <div style={styles.semEscala}><IconAlertTriangle size={36} color="#cbd5e1" /><div style={{ marginTop: 8, color: "#64748b" }}>Nenhum afastamento lançado.</div></div>}
        {listaOrdenada.map((a) => {
          const pol = policiais.find((p) => p.id === a.policialId);
          const tipo = TIPOS_AFASTAMENTO.find((t) => t.id === a.tipo);
          return (
            <div key={a.id} style={styles.cardPolicial}>
              <div style={styles.cardPolicialInfo}>
                <div style={styles.cardPolicialNome}>
                  {pol?.nomeGuerra || "(policial removido)"}
                  <span style={{ ...styles.reTag, color: tipo?.cor, background: (tipo?.cor || "#888") + "1a" }}>{tipo?.label}</span>
                </div>
                <div style={styles.cardPolicialDetalhe}>
                  {a.dataFim ? `${formatarDataBR(a.dataInicio)} até ${formatarDataBR(a.dataFim)}` : formatarDataBR(a.dataInicio)}
                </div>
              </div>
              <button onClick={() => remover(a.id)} style={styles.iconBtnDanger}><IconTrash size={16} /></button>
            </div>
          );
        })}
      </div>
      {modalAberto && <ModalAfastamento policiais={policiais} onClose={() => setModalAberto(false)} onSalvar={adicionar} />}
    </div>
  );
}

function ModalAfastamento({ policiais, onClose, onSalvar }) {

          <select style={styles.input} value={form.tipo} onChange={(e) => setForm({ ...form, tipo: e.target.value })}>

        </form>
      </div>
    </div>
  );
}

function TelaPoliciais({ policiais, salvarPoliciais }) {
  const [modalAberto, setModalAberto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [filtroEquipe, setFiltroEquipe] = useState("todos");
  const listaFiltrada = filtroEquipe === "todos" ? policiais : policiais.filter((p) => p.equipeId === filtroEquipe);

  const salvarPolicial = (dados) => {
    if (dados.re && policiais.some((p) => p.re === dados.re && p.id !== editando?.id)) { alert("Já existe outro policial cadastrado com esse RE."); return; }
    if (editando) salvarPoliciais(policiais.map((p) => (p.id === editando.id ? { ...p, ...dados } : p)));
    else salvarPoliciais([...policiais, { ...dados, id: `pm-${Date.now()}`, ativo: true }]);
    setModalAberto(false); setEditando(null);
  };
  const removerPolicial = (id) => { if (confirm("Remover este policial do cadastro? Os afastamentos/reforços lançados para ele permanecerão salvos, mas deixarão de aparecer na grade.")) salvarPoliciais(policiais.filter((p) => p.id !== id), id); };

  return (
    <div>
      <div style={styles.filtroRow}>
        <select value={filtroEquipe} onChange={(e) => setFiltroEquipe(e.target.value)} style={styles.selectFull}>
          <option value="todos">Todas as equipes ({policiais.length})</option>
          {EQUIPES.map((eq) => <option key={eq.id} value={eq.id}>{eq.nome} ({policiais.filter((p) => p.equipeId === eq.id).length})</option>)}
        </select>
        <button onClick={() => { setEditando(null); setModalAberto(true); }} style={styles.btnPrimary}><IconPlus size={16} /> Novo policial</button>
      </div>
      <div style={styles.listaPoliciais}>
        {listaFiltrada.length === 0 && <div style={styles.semEscala}><IconUsers size={36} color="#cbd5e1" /><div style={{ marginTop: 8, color: "#64748b" }}>Nenhum policial cadastrado nesta equipe ainda.</div></div>}
        {listaFiltrada.map((p) => {
          const eq = EQUIPES.find((e) => e.id === p.equipeId);
          const grupo = GRUPOS_REVEZAMENTO.find((g) => g.id === p.grupoRevezamento);
          return (
            <div key={p.id} style={styles.cardPolicial}>
              <div style={styles.cardPolicialInfo}>
                <div style={styles.cardPolicialNome}>{p.nomeGuerra} {p.re && <span style={styles.reTag}>RE {p.re}</span>}</div>
                <div style={styles.cardPolicialDetalhe}>{p.posto} · {eq?.nome}{grupo ? ` · ${grupo.label}` : ""}</div>
              </div>
              <div style={styles.cardPolicialAcoes}>
                <button onClick={() => { setEditando(p); setModalAberto(true); }} style={styles.btnTextoSmall}>Editar</button>
                <button onClick={() => removerPolicial(p.id)} style={styles.iconBtnDanger}><IconTrash size={16} /></button>
              </div>
            </div>
          );
        })}
      </div>
      {modalAberto && <ModalPolicial policial={editando} onClose={() => { setModalAberto(false); setEditando(null); }} onSalvar={salvarPolicial} />}
    </div>
  );
}

            <>

              <select style={styles.input} value={form.grupoRevezamento || "grupoA"} onChange={(e) => setForm({ ...form, grupoRevezamento: e.target.value })}>{GRUPOS_REVEZAMENTO.map((g) => <option key={g.id} value={g.id}>{g.label}</option>)}</select>
              <div style={styles.hint}>Define em qual posição do rodízio de 4 dias (dia/noite/folga/folga) este policial entra. Distribua os policiais igualmente entre as 4 equipes. A data-âncora desta lotação é definida em "Configuração da escala".</div>
            </>
          )}
          {equipeSelecionada?.tipo !== "12x24-12x48" && (
            <>
              <label style={styles.label}>Data-âncora do ciclo</label>
              <input type="date" style={styles.input} value={form.dataAncora || "2026-01-01"} onChange={(e) => setForm({ ...form, dataAncora: e.target.value })} />
              <div style={styles.hint}>Um dia em que este policial estava de serviço.</div>
              <label style={styles.label}>Defasagem do ciclo (dias)</label>
              <select style={styles.input} value={form.offsetCiclo || 0} onChange={(e) => setForm({ ...form, offsetCiclo: Number(e.target.value) })}>
                <option value={0}>0 — mesmo grupo da data-âncora</option><option value={1}>1 dia</option><option value={2}>2 dias</option><option value={3}>3 dias</option>
              </select>
            </>
          )}
          <div style={styles.modalFooter}><button type="button" onClick={onClose} style={styles.btnTextoCancelar}>Cancelar</button><button type="submit" style={styles.btnPrimary}><IconCheck size={16} /> Salvar</button></div>
        </form>
      </div>
    </div>
  );
}

/* ============================================================
   TELA: ESCALANTES
   ============================================================ */

function TelaEscalantes({ escalantes, salvarEscalantes }) {
  const [modalAberto, setModalAberto] = useState(false);
  const adicionar = (dados) => {
    if (escalantes.some((e) => e.usuario.toLowerCase() === dados.usuario.toLowerCase())) { alert("Já existe um escalante com esse usuário."); return; }
    salvarEscalantes([...escalantes, dados]); setModalAberto(false);
  };
  const remover = (usuario) => {
    if (escalantes.length <= 1) { alert("É necessário manter ao menos 1 escalante."); return; }
    if (confirm(`Remover o acesso de "${usuario}"?`)) salvarEscalantes(escalantes.filter((e) => e.usuario !== usuario), usuario);
  };
  return (
    <div>
      <div style={styles.filtroRow}>
        <div style={{ color: "#64748b", fontSize: 14 }}>{escalantes.length} escalante(s) com acesso de edição</div>
        <button onClick={() => setModalAberto(true)} style={styles.btnPrimary}><IconPlus size={16} /> Novo escalante</button>
      </div>
      <div style={styles.listaPoliciais}>
        {escalantes.map((e) => (
          <div key={e.usuario} style={styles.cardPolicial}>
            <div style={styles.cardPolicialInfo}><div style={styles.cardPolicialNome}>{e.nome}</div><div style={styles.cardPolicialDetalhe}>Usuário: {e.usuario}</div></div>
            <button onClick={() => remover(e.usuario)} style={styles.iconBtnDanger}><IconTrash size={16} /></button>
          </div>
        ))}
      </div>
      {modalAberto && <ModalEscalante onClose={() => setModalAberto(false)} onSalvar={adicionar} />}
    </div>
  );
}
function ModalEscalante({ onClose, onSalvar }) {
  const [form, setForm] = useState({ nome: "", usuario: "", senha: "" });
  const submit = (e) => { e.preventDefault(); if (!form.nome.trim() || !form.usuario.trim() || !form.senha.trim()) { alert("Preencha todos os campos."); return; } onSalvar(form); };
  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalCard} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}><div style={styles.modalTitle}>Novo escalante</div><button onClick={onClose} style={styles.modalClose}><IconX size={20} /></button></div>
        <form onSubmit={submit} style={styles.modalBody}>
          <label style={styles.label}>Nome</label><input style={styles.input} value={form.nome} onChange={(e) => setForm({ ...form, nome: e.target.value })} />
          <label style={styles.label}>Usuário</label><input style={styles.input} value={form.usuario} onChange={(e) => setForm({ ...form, usuario: e.target.value })} />
          <label style={styles.label}>Senha</label><input style={styles.input} type="password" value={form.senha} onChange={(e) => setForm({ ...form, senha: e.target.value })} />
          <div style={styles.modalFooter}><button type="button" onClick={onClose} style={styles.btnTextoCancelar}>Cancelar</button><button type="submit" style={styles.btnPrimary}><IconCheck size={16} /> Salvar</button></div>
        </form>
      </div>
    </div>
  );
}

/* ============================================================
   EXPORTAÇÃO PDF
   ============================================================ */

function exportarPDF(equipe, dias, membros, statusFinal, dataRef) {
  const win = window.open("", "_blank");
  if (!win) { alert("Permita pop-ups para exportar o PDF."); return; }
  const linhasHeader = dias.map((iso) => { const dow = diaDaSemana(iso); return `<th class="${dow===0||dow===6?'fimsemana':''}">${iso.split("-")[2]}<br/><span class="dow">${["D","S","T","Q","Q","S","S"][dow]}</span></th>`; }).join("");
  const linhasCorpo = membros.map((p) => {
    const celulas = dias.map((iso) => {
      const item = statusFinal(iso, p.id); let texto = "—", style = "color:#ccc";
      if (item) {
        if (item.conflito) { texto = item.marcacaoSigla; style = "background:#fee2e2;font-weight:bold;color:#dc2626;border:2px solid #dc2626"; }
        else if (item.marcacaoSigla) { texto = item.marcacaoSigla; style = `background:${item.marcacaoCor}22;font-weight:bold;color:${item.marcacaoCor}`; }
        else if (item.status === "DIA") { texto = "DIA"; style = "background:#fef3c7;font-weight:bold;color:#92400e"; }
        else if (item.status === "NOITE") { texto = "NOI"; style = "background:#dbeafe;font-weight:bold;color:#1e40af"; }
        else if (item.status === "SERVICO") { texto = "SRV"; style = "background:#dcfce7;font-weight:bold;color:#15803d"; }
      }
      return `<td style="${style}">${texto}</td>`;
    }).join("");
    return `<tr><td class="nomeCol"><strong>${p.nomeGuerra}</strong><br/><span class="posto">${p.posto}</span></td>${celulas}</tr>`;
  }).join("");
  const legendaTipos = TIPOS_AFASTAMENTO.map((t) => `<span style="color:${t.cor}">■ ${t.sigla} = ${t.label}</span>`).join("");
  win.document.write(`<html><head><title>Escala ${equipe.nome} - ${MESES[dataRef.mes]} ${dataRef.ano}</title>
    <style>body{font-family:Arial,sans-serif;padding:24px;color:#1a1a1a}h1{font-size:17px;margin-bottom:2px}h2{font-size:13px;color:#555;font-weight:normal;margin-top:0}table{border-collapse:collapse;margin-top:16px;font-size:10px;width:100%}th,td{border:1px solid #ccc;padding:4px 3px;text-align:center}th{background:#1a3a5c;color:white;font-size:9px}th.fimsemana{background:#3b5a78}.dow{font-size:7px;opacity:.8}td.nomeCol{text-align:left;white-space:nowrap;padding:4px 8px}.posto{font-size:8px;color:#777}.footer{margin-top:18px;font-size:10px;color:#888}.legenda{margin-top:10px;font-size:9px;display:flex;flex-wrap:wrap;gap:10px}@media print{body{padding:10px}}</style>
    </head><body><h1>2ª Companhia PM — Escala Mensal</h1><h2>${equipe.nome} · ${MESES[dataRef.mes]} de ${dataRef.ano}</h2>
    <table><thead><tr><th class="nomeCol" style="text-align:left">Policial</th>${linhasHeader}</tr></thead><tbody>${linhasCorpo}</tbody></table>
    <div class="legenda"><span style="color:#92400e">■ DIA</span><span style="color:#1e40af">■ NOITE</span><span style="color:#15803d">■ SERVIÇO</span>${legendaTipos}</div>
    <div class="footer">Documento gerado em ${new Date().toLocaleString("pt-BR")}.</div><sc` + `ript>window.onload=()=>window.print();</sc` + `ript></body></html>`);
  win.document.close();
}
